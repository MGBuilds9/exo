description: "proxmox host with one inactive zfs storage and stale NFS mount"
responses:
  - command_regex: "pvesm\\s+status"
    stdout: |
      Name             Type     Status           Total            Used       Available        %
      local            dir      active     50000000        12000000        38000000   24.00%
      local-zfs        zfspool  inactive          0               0               0    0.00%
      nfs-backups      nfs      active     90000000        20000000        70000000   22.22%
    exit_code: 0
    elapsed_seconds: 0.4

  - command_regex: "mount.*nfs"
    stdout: |
      backup.lan:/srv/backups on /mnt/backups type nfs (rw,relatime,vers=4.2,rsize=131072,wsize=131072,namlen=255,hard,proto=tcp,timeo=600,retrans=2,sec=sys,addr=10.0.0.10,local_lock=none)
      stale.lan:/srv/data on /mnt/data type nfs (rw,relatime,stale,vers=4)
    exit_code: 0
    elapsed_seconds: 0.2

  - command_regex: "systemctl\\s+--failed"
    stdout: |
      UNIT                    LOAD   ACTIVE SUB    DESCRIPTION
      ● nfs-client.service    loaded failed failed NFS Client Setup
      1 loaded units listed.
    exit_code: 0
    elapsed_seconds: 0.1

  - command_regex: "df\\s+-h"
    stdout: |
      Filesystem      Size  Used Avail Use% Mounted on
      /dev/sda1       100G   40G   60G  40% /
      /dev/sda2        50G    5G   45G  10% /boot
      tmpfs            8G     1M    8G   1% /tmp
    exit_code: 0
    elapsed_seconds: 0.1
