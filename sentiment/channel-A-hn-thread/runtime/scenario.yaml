rounds: 4
exit_conditions:
  max_turns: 24
  max_minutes: 30
signals:
- name: upvote_likelihood
  type: numeric
  scale: 0..10
  description: How likely is THIS commenter to upvote the post? 0=downvote, 5=neutral,
    10=enthusiastic upvote.
- name: would_clone
  type: numeric
  scale: 0..10
  description: How likely is THIS commenter to clone the repo and try it themselves?
- name: comment_quality
  type: numeric
  scale: 0..10
  description: Self-assessed quality of the comment they just wrote (would it get
    traction in the thread?)
output:
  format: jsonl
  directory: ./runs/
