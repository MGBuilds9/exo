  \ whole experience. Five commands. One YAML file to edit.\n\n## The actual differentiator:\
  \ it knows YOUR machine\n\nEvery other multi-agent framework (CAMEL, OASIS, LangChain,\
  \ CrewAI) assumes you'll wire your own LLM endpoint, your own vector store, your\
  \ own embedding model. They give you a config to fill in. **exo asks what you have\
  \ and builds the config for you.**\n\n```bash\n./exo doctor\n```\n\nScans:\n- CPU\
  \ cores, RAM, GPU (filtered for real GPUs, not virtual display adapters)\n- Disk\
  \ space acr\n\n[...truncated for bundle...]\n\n=== WHY.md ===\n# Why exo exists\n\
  \n## The gap\n\nYou can describe what you want in plain English:\n> \"I want to\
  \ simulate the conversation my sales team is about to have with three stakeholders\
  \ next week, so I know what objections will come up before I'm in the room.\"\n\
  >\n> \"I want to simulate the public reaction to this press release with 50 personas\
  \ of different demographics, so I know what fires to put out before publishing.\"\
  \n>\n> \"I want to simulate a construction-site contract dispute between the project\
  \ manager, the estimator, the foreman, and the executive, so I know whose perspective\
  \ I'm missing.\"\n\nThese all require the same thing: **a multi-agent system where\
  \ each agent has a persona, a memory, and a position, and they interact under a\
  \ scenario you define.**\n\nThe infrastructure exists. The libraries exist. CAMEL-AI\
  \ exists. OASIS exists. MiroFish-Offline exists. Yet none of it answers the question\
  \ *\"how do I, today, in 30 minutes, stand up a simulation for my specific scenario\
  \ without becoming a researcher first?\"*\n\n## What's wrong with the existing options\n\
  \n| Option | What's missing |\n|---|---|\n| Roll your own with LangChain + LLM calls\
  \ | No memory architecture. No conversation harness. Three months of work before\
  \ your first transcript. |\n| LangGraph | Code-first. Assumes you've already designed\
  \ the architecture. Designed for product agents, not simulations. |\n| CrewAI |\
  \ Multi-agent, but no opinion on memory tier. No \"stand this up for my domain\"\
  \ path. |\n| CAMEL-AI / OASIS | The actual engine — but no opinionated bundle, no\
  \ template library, no \"edit one YAML file\" path. |\n| MiroFish-Offline | Excellent\
  \ reference implementation, but hardcoded for social-media reaction modeling. Re-purposing\
  \ it for \"sales conversation\" requires reading 8,000 lines of Python. |\n\n##\
  \ What exo does\n\nOne thing: **collapse the gap between \"I want a simulation of\
  \ X\" and \"I have a transcript of X.\"**\n\nThe opinionated bundle is:\n1. **Memory\
  \ architecture**: Qdrant + Neo4j + Postgres in a single `docker compose up`. The\
  \ canonical hybrid pattern. Pick which tiers your sim needs in YAML; the rest stay\
  \ idle.\n2. **LLM router**: Claude OAuth for frontier agents, Ollama Cloud for cloud\
  \ OSS, local Ollama for cost-free agents. Each actor picks their own model in YAML.\n\
  3. **Architect CLI**: 12 questions. Outputs a complete `domain.yaml` + `scenario.yaml`.\
  \ No PhD required.\n4. **Template library**: Pre-built simulations for the most\
  \ common cases (social-media, sales, wedding-coordination, healthcare-triage, construction-stakeholder,\
  \ incident-response). `cp -r` and edit.\n5. **YAML-first config**: Every aspect\
  \ of a sim is declarative. Version it. Diff it. Hand it to a teammate.\n\nEverything\
  \ else — the runtime, the agent loop, the embeddings — is delegated to libraries\
  \ that already do their jobs well.\n\n## What exo is NOT\n\n- **Not a chatbot framework.**\
  \ This is for simulating populations of agents, not deploying one assistant.\n-\
  \ **Not a LangChain killer.** LangChain is for production agents that serve users.\
  \ exo is for *rehearsal* — simulating what would happen so you can prepare.\n- **Not\
  \ vendor lock-in.** Apache 2.0. Runs on your laptop. Runs on your homelab. Plug\
  \ whichever LLM you want. Take your YAML config and run it elsewhere if you outgrow\
  \ the bundle.\n- **Not magic.** Multi-agent simulation produces plausible synthesis,\
  \ not ground truth. Treat transcripts as hypotheses to stress-test in reality, not\
  \ as predictions to act on directly.\n\n## Who exo is for\n\nIf you've ever wished\
  \ you could ask \"what would happen if...\" and get a transcript instead of a guess,\
  \ exo is for you.\n\nIf you're three days from a high-stakes meeting and you want\
  \ to rehearse against simulated stakeholders before walking in, exo is for you.\n\
  \nIf you're a researcher modeling social dynamics, organizational behavior, or market\
  \ reactions and you don't want to rebuild the harness from scratch, exo is for you.\n\
  \nIf you're a homelab self-hoster who refuses to send your prompts to OpenAI, exo\
  \ is for you.\n\nIf you build per\n\n[...truncated for bundle...]\n\n=== Quickstart.md\
  \ ===\n# Quickstart\n\nFive minutes from clone to first transcript.\n\n## Fastest\
  \ path (fully local — no Docker, no cloud, no API keys)\n\nFor simple multi-actor\
  \ chat sims, you do NOT need Docker, Qdrant, Neo4j,\nor Postgres. They're available\
  \ via compose profiles but stay off unless\nyou opt in.\n\n**Prereqs** (honest about\
  \ what you need first):\n- Python 3.11+ installed\n- Ollama installed and running\
  \ (`ollama serve`) — see [ollama.com](https://ollama.com/download)\n- A chat model\
  \ pulled locally — `ollama pull qwen2.5:7b` (~4GB) or any model you have\n- On Windows:\
  \ WSL2 or Git Bash for the `sed` step (or edit the YAML manually)\n\nIf you have\
  \ all of those: 4 commands, ~90 seconds:\n\n```bash\ngit clone https://github.com/MGBuilds9/exo.git\n\
  cd exo\npip install -r requirements.txt\nexport LOCAL_OLLAMA_BASE_URL=http://localhost:11434/v1\n\
  \n# Edit the template to use local-ollama instead of ollama-cloud\n# (Or open templates/sales-pipeline/domain.yaml\
  \ and replace the model\n#  strings manually — that's portable to Windows without\
  \ sed)\nsed -i 's|ollama-cloud/qwen3-coder:480b|local-ollama/qwen2.5:7b|g' \\\n\
  \    templates/sales-pipeline/domain.yaml\n\n./exo run templates/sales-pipeline/domain.yaml\n\
  ```\n\nYour prompts and personas never leave your machine.\n\n> **Honest scope note**:\
  \ the \"5-minute\" headline above only holds if you already\n> have Python + Ollama\
  \ + a pulled model. From a fresh machine, you're\n> ~15-30 min including model download.\
  \ That's still good, just not \"5 min.\"\n\n## Full path (with memory tiers)\n\n\
  For sims that use vector retrieval / graph relationships / structured records,\n\
  spin up the database stack:\n\n## 0. Prereqs\n\n- Docker + Docker Compose\n- Python\
  \ 3.11+ (for the CLI; the runner runs in Docker)\n- An LLM endpoint. Pick one:\n\
  \  - **Ollama Cloud** (easiest — frontier OSS models via API): get key at https://ollama.com\n\
  \  - **Local Ollama** (free; needs ≥16GB RAM): `ollama pull qwen2.5:14b`\n  - **Claude\
  \ OAuth** (frontier): requires Claude Code installed (v0.2+)\n\n## 1. Clone\n\n\
  ```bash\ngit clone https://github.com/MGBuilds9/exo.git\ncd exo\ncp .env.example\
  \ .env\n# Edit .env — set ONE of OLLAMA_CLOUD_API_KEY, LOCAL_OLLAMA_BASE_URL, or\
  \ leave Claude OAuth defaults\n```\n\n## 2. Start the stack\n\n```bash\ndocker compose\
  \ up -d\n# Wait ~30s for Neo4j health check\ncurl -s http://localhost:5050/health\n\
  # → {\"service\": \"exo-runner\", \"status\": \"ok\"}\n```\n\n## 3. Run an existing\
  \ template\n\n```bash\npip install -r requirements.txt\n./exo run templates/sales-pipeline/domain.yaml\n\
  ```\n\nYou'll see a 20-turn transcript in real-time, with sentiment + trust +\n\
  deal_momentum signals tracked per actor per turn. Total run time:\n~2 minutes against\
  \ Ollama Cloud.\n\n## 4. Or design your own\n\n```bash\n./exo architect\n# 12 questions\
  \ → writes ./<your-name>/domain.yaml + scenario.yaml\ncd <your-name>\n../exo run\
  \ domain.yaml\n```\n\n## 5. Inspect\n\n```bash\n./exo report sims/<your-sim>/run/\n\
