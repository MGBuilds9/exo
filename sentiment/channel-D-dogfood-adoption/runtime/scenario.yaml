rounds: 3
exit_conditions:
  max_turns: 24
  max_minutes: 30
signals:
- name: would_clone
  type: numeric
  scale: 0..10
  description: Likelihood you actually `git clone` this repo (10=already doing it,
    0=closing tab)
- name: would_recommend
  type: numeric
  scale: 0..10
  description: Would you tell ONE specific colleague to look at this?
- name: comment_quality
  type: numeric
  scale: 0..10
  description: How well-reasoned is your decision? (Self-assessed honesty signal)
output:
  format: jsonl
  directory: ./runs/
