name: Build leaderboard

on:
  schedule:
    # Weekly: Sunday at 14:00 UTC
    - cron: "0 14 * * 0"
  workflow_dispatch: {}
  push:
    paths:
      - "exo_runtime/recommend/taxonomy.yaml"
      - "scripts/build_leaderboard.py"
      - ".github/workflows/leaderboard.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install pyyaml click rich

      - name: gh CLI auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Build leaderboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_leaderboard.py --out docs --verbose

      - name: Add .nojekyll (skip Jekyll processing)
        run: touch docs/.nojekyll

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "leaderboard: weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi
