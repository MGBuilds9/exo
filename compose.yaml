# exo — multi-agent simulation stack
# Layout: Qdrant (vector) + Neo4j (graph) + Postgres (structured) + exo-runner (the engine)
# LLM inference: NOT in compose. Configure via .env (LLM_BASE_URL, LLM_API_KEY).
# Defaults to your local Ollama / llama-swap on the host; swap to Ollama Cloud or Claude OAuth as needed.

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: exo-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: exo-neo4j
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-exo-local-only}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: exo-postgres
    ports:
      - "5433:5432"   # 5433 to avoid clashing with any existing local Postgres
    environment:
      - POSTGRES_DB=exo
      - POSTGRES_USER=exo
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-exo-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "exo"]
      interval: 5s
      timeout: 3s
      retries: 5

  exo-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    container_name: exo-runner
    env_file: [.env]
    environment:
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-exo-local-only}
      - DATABASE_URL=postgresql://exo:${POSTGRES_PASSWORD:-exo-local-only}@postgres:5432/exo
    ports:
      - "5050:5050"   # API + minimal web UI
    volumes:
      - ./sims:/app/sims
      - ./templates:/app/templates:ro
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:
