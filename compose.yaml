# exo — multi-agent simulation stack
#
# Default `docker compose up` starts ONLY the exo-runner. Memory tier DBs
# (Qdrant, Neo4j, Postgres) are profile-gated — they only start when you
# explicitly opt in via `--profile <name>` flags.
#
# Examples:
#   docker compose up                    # runner only (no DBs)
#   docker compose --profile vector up   # runner + Qdrant
#   docker compose --profile graph up    # runner + Neo4j
#   docker compose --profile sql up      # runner + Postgres
#   docker compose --profile all up      # runner + all three
#
# LLM inference is NEVER in this compose. Configure via .env
# (LLM_BASE_URL, LLM_API_KEY) — defaults to your local Ollama on the host.

services:
  exo-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    container_name: exo-runner
    env_file: [.env]
    environment:
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-exo-local-only}
      - DATABASE_URL=postgresql://exo:${POSTGRES_PASSWORD:-exo-local-only}@postgres:5432/exo
    ports:
      - "5050:5050"   # API + minimal web UI
    volumes:
      - ./sims:/app/sims
      - ./templates:/app/templates:ro
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: exo-qdrant
    profiles: ["vector", "all"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: exo-neo4j
    profiles: ["graph", "all"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-exo-local-only}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: exo-postgres
    profiles: ["sql", "all"]
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=exo
      - POSTGRES_USER=exo
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-exo-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "exo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:
