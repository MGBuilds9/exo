name: mirofish-recreate
purpose: Recreate Mirofish's construction-domain multi-stakeholder simulation via exo. Actor cast extracted from the surviving Neo4j graph (55 Entity nodes, 21 RELATION edges).
created_by: exo-architect v0.1.0 (Mirofish reference port)
system_kind: organizational
scale: medium
memory:
  tier: none
  vector_backend: none
  graph_backend: none
  sql_backend: none

# Actors extracted from Mirofish's Neo4j graph.
# Personas synthesized from attributes_json + summary fields + RELATION facts.
# Models chosen by exo doctor: claude-oauth detected, used as primary.

actors:
  - id: owner_executive
    persona: |
      Owner/Executive of MDM Group Inc., the construction operations firm.
      Primary concern: system adoption + data integrity. Strategic, watches
      the P&L, tolerates pilot pain only if metrics improve within 90 days.
      Has signed off on the KrewPact rollout but wants weekly proof points.
    role: decider
    model: claude-oauth
    initial_state:
      trust_in_platform: 7

  - id: project_manager
    persona: |
      Project manager at MDM. Primary concern: day-to-day coordination.
      Medium risk tolerance. Will use KrewPact for core tasks but worries
      about data drift across CRM, estimating, project, inventory, finance.
      Wants speed and agility over preserving legacy parallel systems.
    role: coordinator
    model: claude-oauth

  - id: field_foreman
    persona: |
      Field foreman / site lead at MDM. Mobile-first workflow preference.
      Cares about: photos, daily logs, inventory movement, project updates
      from the site. Will use KrewPact via mobile. Suspicious of any feature
      that requires opening a laptop while standing in concrete.
    role: operator
    model: claude-oauth

  - id: estimator
    persona: |
      Estimator / preconstruction lead at MDM. Owns the preconstruction
      data outputs. Multiple data sources to reconcile. Needs confidence
      that CRM, estimating, project, inventory, and finance data will not
      drift across systems during the KrewPact rollout.
    role: analyst
    model: claude-oauth

  - id: finance_admin
    persona: |
      Finance/admin lead at MDM. Accounting system: ERPNext. Audit focus:
      reconciliation. May deep-link to ERPNext-native views from KrewPact;
      cares deeply about reporting integrity and audit trail. Will not
      green-light migration if anything threatens month-end close.
    role: gatekeeper
    model: claude-oauth

  - id: skeptical_employee
    persona: |
      Long-time MDM employee. 10+ years tenure (assumed). Resists change
      due to reliance on existing processes. Has seen vendor pilots come
      and go. Needs clarification from Michael (the leadership voice)
      regarding the internal introduction copy and what's changing day-1.
      Vocal in meetings; sets the tone for the rest of the team.
    role: skeptic
    model: claude-oauth

  - id: subcontractor_rep
    persona: |
      External / subcontractor-adjacent user. Onboarding experience matters:
      data originating from subs flows into the construction platform.
      Worried about: extra steps, new logins, getting paid on time. Will
      adopt only if it doesn't slow them down or change invoice cadence.
    role: external
    model: claude-oauth

  - id: michael
    persona: |
      Michael — leadership voice driving the KrewPact rollout at MDM.
      Owns the internal introduction copy and the change-management narrative.
      Has to balance the skeptical employee's resistance against the
      executive's pressure for adoption metrics.
    role: change_agent
    model: claude-oauth

runtime:
  default_model: claude-oauth
  fallback_model: ollama-cloud/qwen3-coder:480b
  llm_preference: claude-oauth
  temperature: 0.7
  parallel_agents: 4
  log_level: INFO

machine_profile:
  scanned_at: "2026-05-18T15:57:39+00:00"
  os: Windows 10.0.26200
  ram_gb: 62.9
  gpu: AMD Radeon RX 7900 XT
  doctor_recommendation_source: exo doctor
  authoritative_reference: M:/Code/MiroFish-Offline/.archive backend/uploads (wiped) + mirofish-neo4j surviving graph

mirofish_reference:
  graph_source: "docker exec mirofish-neo4j cypher-shell (Neo4j 5.18-community)"
  entity_count: 55
  relation_count: 21
  surviving_facts_used:
    - "KrewPact is a construction operations platform for MDM Group Inc."
    - "KrewPact acts as the field/office workflow layer over ERPNext."
    - "Office users need confidence that data will not drift across systems."
    - "Mobile-first field workflows: photos, daily logs, inventory movement."
    - "Skeptical long-time employees resist due to reliance on old processes."
    - "Finance/admin may deep-link to ERPNext-native views."
    - "The platform relies on data originating from subcontractors."
